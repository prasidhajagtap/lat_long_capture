<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Coordinate Sharer</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #1a1a1a; 
            color: #ffffff; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            background: #2a2a2a; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
            max-width: 400px;
            width: 90%;
        }
        h2 { margin-top: 0; }
        button { 
            background: #4CAF50; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: bold;
            margin: 10px 0; 
            transition: background 0.2s;
            width: 100%;
        }
        button:hover { background: #45a049; }
        #output { 
            margin: 20px 0; 
            padding: 15px; 
            background: #111; 
            border-radius: 6px; 
            font-family: monospace; 
            font-size: 1.2rem; 
            min-height: 24px; 
            letter-spacing: 1px;
            word-break: break-all;
        }
        #copyBtn { 
            display: none; 
            background: #008CBA; 
        }
        #copyBtn:hover { background: #007B9E; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Location Sharer</h2>
        <p style="color: #aaa; font-size: 0.9rem;">Allow location access to capture your coordinates.</p>
        
        <button id="getLocBtn">Get My Location</button>
        <div id="output">Waiting for input...</div>
        <button id="copyBtn">Copy Coordinates</button>
    </div>

    <script>
        const getLocBtn = document.getElementById('getLocBtn');
        const copyBtn = document.getElementById('copyBtn');
        const output = document.getElementById('output');
        let currentCoords = '';

        getLocBtn.addEventListener('click', () => {
            // Check if the browser supports Geolocation
            if (!navigator.geolocation) {
                output.textContent = "Geolocation is not supported by your browser.";
                return;
            }

            output.textContent = "Locating...";
            copyBtn.style.display = 'none';
            
            // Fetch the position
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude.toFixed(6);
                    const lng = position.coords.longitude.toFixed(6);
                    
                    // Format and display
                    currentCoords = `${lat}, ${lng}`;
                    output.textContent = currentCoords;
                    
                    // Reveal the copy button
                    copyBtn.style.display = 'block';
                },
                (error) => {
                    // Handle user denying permission or network drops
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            output.textContent = "Permission denied.";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            output.textContent = "Location unavailable.";
                            break;
                        case error.TIMEOUT:
                            output.textContent = "Request timed out.";
                            break;
                        default:
                            output.textContent = "An unknown error occurred.";
                            break;
                    }
                },
                {
                    enableHighAccuracy: true, // Forces the device to use GPS hardware if available
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        });

        copyBtn.addEventListener('click', async () => {
            try {
                // Write to device clipboard
                await navigator.clipboard.writeText(currentCoords);
                
                // Visual feedback
                const originalText = copyBtn.textContent;
                copyBtn.textContent = "Copied to Clipboard! ✓";
                copyBtn.style.background = "#4CAF50";
                
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.style.background = "#008CBA";
                }, 2000);
            } catch (err) {
                output.textContent = "Failed to copy text.";
            }
        });
    </script>
</body>
</html>
